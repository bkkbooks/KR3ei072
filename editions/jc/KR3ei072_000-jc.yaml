body:
  text: 總論天地絪縕萬物化醇男女構精萬物化生此造化自然之理也亦無思無為之道也故有人道即有夫婦有夫婦即有子嗣又何有乏嗣之說然天有不生之時地有不毛之域則人不能無乏嗣之流矣然則生者自生乏者當乏而求嗣之說又何為也果可求耶果不可求耶則其中亦自有說亦自有法矣所謂說者非為不生不毛者而說也亦非為少壯強盛者而說也蓋不生不毛者出於先天之稟賦非可以人力為也少壯強盛者出於妙合之自然不必識不必知也惟是能子弗子者無後難堪本非天付衰老無兒者精力日去豈比少年此所以有挽回之人力則有說而有法矣雖法之垂諸古者已不為少然以余覺之則若有未盡其妙蘊者焉因而臚列其法曰天時曰地利曰人事曰藥食曰疾病但犯其一便足敗乃公事矣賓於晚年得子率鑑乎此凡苦於是者惟察之信之則嗣續之猷或非渺小故命之曰宜麟策時氣天時一凡交會下種之時古云宜擇吉日良時天德月德及干支旺相當避丙丁之說顧以倉猝之頃亦安得擇而後行似屬迂遠不足憑也然惟天日晴明光風霽月時和氣爽及情思清寧精神閒裕之況則隨行隨止不待擇而人人可辨於斯得子非惟少疾而必且聰慧賢明胎元稟賦實基於此至有不知避忌者犯天地之晦冥大霧則受愚蠢迷濛之氣犯日月星辰之薄蝕則受殘缺刑剋之氣犯雷霆風雨之慘暴則受狠怒驚狂之氣犯不陰不陽倏熱倏寒之變幻則受奸險詭詐之氣故氣盈則盈乘之則多壽氣縮則縮犯之則多夭顧人生六合之內凡生長壯老已何非受氣於生成而知愚賢不肖又孰非稟質於天地此感兆元始之大本苟思造命而贊化育則當以此為首務陰陽天時二乾道成男坤道成女此固生成之至道然亦何以見之亦何以用之蓋乾坤不用用在坎離坎離之用陰陽而已夫離本居陽何以為女以陽之中而陰之初也坎本居陰何以為男以陰之中而陽之初也蓋中者盛於上盛者必漸消初者生於下生者必漸長故陽生於坎從左而漸升升則為陽而就明陰生於離從右而漸降降則為陰而就晦此即陰陽之用也而千變萬化莫不由之由之推廣則凡冬至夏至一歲之陰陽也子東午西一日之陰陽也有節有中月令之陰陽也或明或晦時氣之陰陽也節前節後消長之陰陽也月光潮汛盈虛之陰陽也再以及人則老夫少妻陰若勝矣有顛之倒之之妙彼強此弱陽亦在也有操之縱之之權顧無往而非陰陽之用也知之而從陽避陰則乾道成男不知而背陽向陰則坤道成女矣明眼入其鑑而悟之筆有難於盡意也地利地利一地利關於子嗣非不重也有陰宅之宜子孫者常見螽斯之多有陽宅之宜子孫者惟生氣天乙方為最吉然吉地吉人每多不期而會所謂有德斯有人有人斯有土此其所致之由自非偶然故曰必先有心地而後有陰地信非誣也第其理深義邃有非一言可悉然宗枝攸系誠有不可不知者此外如寢室交會之所亦最當知宜忌凡神前廟社之側井灶塚樞之傍及日月火光照臨沉陰危險之地但覺神魂不安之處皆不可犯倘有不謹則夭枉殘疾飛災橫禍及不忠不孝之流從而出矣驗如影響可不慎哉基址地利二谷綿瓜瓞當求基址蓋種植者必先擇地破礫之場安望稻黍求子者必先求母薄福之婦安望熊罷倘欲為子嗣之謀而不先謀基址計非得也然而基址之說隱微叵測察亦誠難姑舉其顯而易者十餘條以見其概云耳大都婦人之質貴靜而賤動貴重而賤輕貴厚而賤薄貴蒼而賤嫩故凡唇短嘴小者不堪此子處之部位也耳小輪薄者不堪此腎氣之外候也聲細而不振者不堪此丹田之氣本也形體薄弱者不堪此藏蓄之宮城也飲食纖細者不堪此倉廩血海之源也發焦齒豁者不堪肝虧血而腎虧精也睛露臀削者不堪藏不藏而後無後也顏色嬌豔者不堪與其華者去其實也肉肥勝骨者不堪子宮隘而腎氣詘也嬝娜柔脆筋不束骨者不堪肝腎虧而根幹不堅也山根唇口多青氣者不堪陽不勝陰必多肝脾之滯逆也脈見緊數弦澀者不堪必真陰虧弱經候不調而生氣杳然者也此外如虎頭熊項橫面豎眉及聲如豺狼之質必多刑剋不吉遠之為宜又若剛狠陰惡奸險剋薄之氣尤為種類源流子孫命脈所繫烏可近之雖曰堯亦有丹朱舜亦有瞽瞍然二氣相合未必非一優一劣之所致倘使陰陽有序種址俱宜而稼穡有不登者未之有也惟一有偏勝則偏象見矣是種之不可不擇者有如此不然則麟趾之詩果亦何為而作者耶余因人艱嗣之苦復見人有不如無之苦故日願天常生好人十機人事一陰陽之道合則聚不合則離合則成不合則敗天道人事莫不由之而尤於斯道為最合與不合機有十焉使能得之權在我矣一曰闔闢乃婦人之動機也氣靜則闔氣動則闢動緣氣至如長鯨之飲川如巨觥之無滴斯時也吸以自然莫知其入故未有闢而不受者未有受而不孕者但此機在瞬息之間若未闢而投失之太早闢已而投失之太遲當此之際自別有影響情狀可以默會不可以言得也惟有心人能覺之帶雨施云鮮不穀矣二曰遲速乃男女之合機也遲宜得遲速宜見速但陰陽情質稟有不齊固者遲不固者速遲者嫌速則猶飢待食及咽不能速者畏遲則猶醉添杯欲吐不得遲速不侔不相投矣以遲遇疾宜出奇由逕勿逞先聲以疾遇遲宜靜以自持挑而後戰能反其機適逢其會矣三曰強弱乃男女之畏機也陽強陰弱則畏如蜂蠆避如戈矛陽弱陰強則聞風而靡望塵而北強弱相凌而道同意合者鮮矣然撫弱有道必居仁由義務得其心克強固難非聚精會神安奪其魄此所以強有不足畏弱有不足虞者亦在乎為之者之何如耳四曰遠近乃男女之會機也或以長材排闥唐突非堪或以偷覷跽門敢窺堂室欲拒者不能欲吞者不得聧隔如斯其能姤乎然斂跡在形致遠在氣斂跡在一時養氣非頃刻使不有教養之夙謀恐終無剛勁之銳氣又安能直透重圍而使鳩居鵲巢也五曰盈虛乃男女之生機也胃有盈虛飽則盈而飢則虛也腎有盈虛蓄則盈而泄則虛也盛衰由之成敗亦由之不知所用則得其幸而失其常耳六曰勞逸乃男女之氣機也勞者氣散而怯逸者氣聚而堅既可為破敵之兵機亦可為種植之農具動得其宜勝者多矣七曰懷抱乃男女之情機也情投則合情悖則離喜樂從陽故多陽者多喜鬱怒從陰故多陰者多怒多陽者多生氣多陰者多殺氣生殺之氣即孕育賢愚之機也莫知所從又胡為而然乎八曰暗產乃男子之失機也勿謂我強何虞子嗣勿謂年壯縱亦何妨不知過者失佳期強者無酸味而且隨得隨失猶所莫知自一而再自再而三則亦如斯而已矣附小產論凡小產有遠近其在二月三月為之近五月六月為之遠新受而產者其勢輕懷久而產者其勢重此皆人之所知也至若猶有近者則隨孕隨產矣凡今艱嗣之家犯此者十居五六其為故也總由縱欲而然第自來人所不知亦所不信茲謹以筆代燈用指迷者倘濟後人實深願也請詳言之蓋胎云始肇一月如珠露二月如桃花三月四月而後血脈形體具五月六月而後筋骨毛髮生方其初受亦不過一滴之玄津耳此其橐籥正無依根荄尚無地鞏之則固決之則流故凡受胎之後極宜節欲以防泛溢而少年縱情罔知忌憚雖胎固欲輕者保全亦多其有兼人之勇者或恃強而不敗或既敗而復戰當此時也主方欲靜客不肯休無奈狂徒敲門撞戶顧彼水性熱腸有不啟扉而從隨流而逝者乎斯時也落花與粉蝶齊飛火棗共交梨並逸合汙同流已莫知其昨日孕而今日產矣朔日孕而望日產矣隨孕隨產本無形跡蓋明產者胎已成形小產必覺暗產者胎仍似水直溜何知故凡今之衏彳充亍家多無大產以小產之多也娶娼妓者多少子息以其子宮滑而慣於小產也今嘗見艱嗣求方者問其陽事則曰能戰問其功夫則曰盡通問其意況則怨嘆曰人皆有子我獨無亦豈知人之明產而爾之暗產耶此外如受胎三月五月而每有墮者雖衰薄之婦常有之然必由縱欲不節致傷母氣而墮者為尤多也故凡恃強過勇者多無子以強弱之自相殘也縱肆不節者多不育以盜損胎元之氣也豈悉由婦人之罪哉欲求我方者當以此篇先讀之則傳方之思已過半矣九曰童稚乃女子之時機也方苞方萼生氣未舒甫童甫笄天癸未裕曾見有未實之粒可為種否未足之蠶可為繭否強費心力而年衰者能待乎其亦不知機也矣十曰二火乃男女之陽機也夫君火在心心其君主也相火在腎腎其根本也然二火相因無聲不應故心宜靜不靜則火由欲動而自心挑腎先心後腎者以陽爍陰出乎勉強勉強則氣從乎降而丹田失守已失元陽之本色腎宜足腎足則陽從地起而由腎及心先腎後心者以水濟火本乎自然自然則氣主乎升而百脈齊到斯誠化育之真機然伶薄之夫每從勉強故多犯虛勞詎雲子嗣樸厚之子常由自然故品物咸亨奚慮後人知機君子其務陽道之真機乎蓄妾人事二無故置妾大非美事凡諸反目敗亂多有由之可已則已是亦齊家之一要務也其若年邁妻衰無後為大則勢有不得不置者然置之易而蓄之難使蓄不有法則有蓄之名無蓄之實亦仍與不蓄等耳而蓄之之法有情況焉有寢室焉以情況言之則主母見妾大都非出樂從所以或多嗔怒或多罵詈或因事責其起居或假借加以聲色是皆常情之所必至者而不知產育由於血氣血氣由於情懷情懷不暢則衝任不充衝任不充則胎孕不受雖云置妾果何益與凡蓄妾之不可過嚴者以此再以寢室言之則宜靜宜遠宜少近耳目者為妙蓋私構之頃銳宜男子受宜女人其銳其受皆由乎氣當此時也專則氣聚而直前怯則氣餒而不攝此受與不受之機也然勇怯之由其權在心蓋心之所至氣必至焉心有疑懼心不至矣心有不至氣亦不至矣倘臨期驚有所聞則氣在耳而不及器矣疑有所見則氣在目而不及器矣或忿或畏則氣結在心而不至器矣氣有不至則如石投水而水則無知也且如兩陣交鋒最嫌奸細之偵伺一心無二何堪讒間以相離閨思兵機本無二致凡妾室之不可不靜而遠者以此雖然此不過為錦囊無奈者設倘有高明賢淑因吾言而三省惟宗祧之是慮不惟不妒而且相憐則愈近愈慰而遠之之說豈近人情又若有恭謹良人小心奉治則求容已幸又安敢有遠而敬之之念其然其然吾末如之何也已藥食論方種子之方本無定軌因人而藥各有所宜故凡寒者宜溫熱者宜涼滑者宜澀虛者宜補去其所偏則陰陽和而生化著矣今人不知此理而但知傳方豈宜於彼者亦宜於此耶且或一人偶中而不論宜否而遍傳其神競相制服又豈知張三之帽非李四所可戴也飲食戒飲凡飲食之類則人之臟氣各有所宜似不必過為拘執惟酒多者為不宜蓋胎種先天之氣極宜清楚極宜充實而酒性淫熱非惟亂性亦且亂精精為酒亂則濕熱其半真精其半耳精不充實則胎元不固精多濕熱則他日痘疹驚風脾敗之類率已受造於此矣故凡欲擇期布種者必宜先有所慎與其多飲不如少飲與其少飲猶不如不飲此亦胎元之一大機也欲為子嗣之計者其毋以此為後著男病疾病一疾病之關於胎孕者男子則在精女子則在血無非不足而然凡男子之不足則有精滑精清精冷者及臨事不堅或流而不射者或夢遺頻數或便濁淋澀者或好色以致陰虛陰虛則腰腎痛憊或好男風以致陽極陽極則亢而亡陰或過於強固強固則勝敗不治或素患陰疝陰疝則肝腎乖離此外則或以陽衰陽衰則多寒或以陰虛陰虛則多熱若此者是皆男子之病不得盡諉之婦人也倘知其由而宜治則治之宜反則反之必先其在我而後及婦人則事無不濟矣女病疾病二婦人所重在血血而構精胎孕乃成欲察其病惟於經候見之欲治其病惟於陰分調之蓋經即血也血即陰也陰以應月故月月如期此其常也及其為病則有或先或後者有一月兩至者有兩月一至者有枯絕不通者有頻來不止者有先痛而後行者有先行而後痛者有淡色黑色紫色者有瘀而為條為片者有精血不充而化作白帶白濁者有子宮虛冷而陽氣不能生化者有血中伏熱而陰氣不能凝成者有血癥氣痞子臟不收月水不通者凡此皆真陰之病也真陰既病則陰血不足者不能育胎陰氣不足者不能攝胎是以求子之法首重調經附衍慶編調經至言天地生生之理止陰陽二氣合則生之理全分則人之質定故男秉陽女秉陰男肖日女肖月男子生氣一日一動女子生氣一月一周夜半子時男子生機所發月經行日女子生意所萌能於此生生之時加意保護便可卻病延年此一定之理也每思世間女子較男子頗逸至於富貴之家閨閣婦女錦衣美食曲房深室無飢寒風露筋力勞苦之事然癆瘵偏多疾病時作此何故哉蓋其受病甚微起於所忽而不自知也大抵女子年十四則天癸至月事時下此時生意勃然凡以生以育皆由於此耳第其將行之時新者未生舊者欲去意中必有煩躁之態異於平日彼時能自知經將欲行一切起居便當加意調攝勞碌氣惱俱不宜犯最不可飲食冷物坐臥冷處蓋寒冷乃肅殺之氣最害生意況經行之時凡百骸四肢毛孔皆開然後舊血入於衝脈而下彼時若一受寒氣不論何處其欲下之血即停留不行初則止須毫毛之聚逐日血行周身至於所凝之處則滯而不行日積日多此瘀血癆癥瘕痞塊瘰癧膈噎行經疼痛短縮所由來也至於淨後一二日內則百骸四肢皆生新血此時一受冷氣則生機郁遏無論何處受冷則此處便不生髮此血枯癆症黃瘦無力心脾脹悶月經過期白帶諸病所由生也當其時感之至微原不知覺至病已成醫家又隨病施治不究所由此婦人所以多病也況當貴之家婦女素習驕恣又善於掩飾甜瓜冷果一時可口禁之不能且好吃生冷則胃氣內寒見熱便怕不知一時之爽利有限日久之疼痛難當以致不能生育種種受害皆由於此今特指出凡天下婦女能於經行時戒生冷氣惱如產後調攝一般每月不過五六日使百病自除此時服藥亦易收效故去積行瘀須於經行之時趁勢下之補養調理須於經淨一日乘機助之其奏功必速於往日此中實具至妙元機奈天下庸醫茫如霧露嗣後見此書者信而遵行若有疾婦女半年之內有不脫體安吉者誓斷吾舌茲因衍慶編成特著此論以贅於後使天下婦女知之不惟永無疾苦而廣嗣多男亦庶幾少助天下大生之德耳辨古種子之法古人言之不少而余謂其若未盡善者蓋亦有疑而云然謹並列而辨之亦以備達者之裁正一廣嗣訣云三十時辰兩日半二十八九君須算落紅滿地是佳期金水過時徒霍亂霍亂之時枉費功樹頭樹底覓殘紅但解開花能結子何愁丹桂不成叢按此言婦人經期方止其時子宮正開便是布種之時過此佳期則子宮閉而不受胎矣然有十日半月及二十日之後受胎者又何為其然也又一哲婦曰若依此說則凡有不端者但於後半月為之自可無他慮矣善哉言也此言果可信否一道藏經曰婦人月信止後一日三日五日合者乾道成男二日四日六日合者坤道成女按此以單數屬陽故成男偶數屬陰故成女果若然則誰不知之得子何難也總未必然一褚氏遺書云男女之合二情交暢若陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先至陰血後參精開裹血血入為本而女形成矣按此一說余初見之甚若有味有理及久察之則大有不然蓋相合之頃豈堪動血惟既結之後則精以肇基血以滋育而胎漸成也即或以血字改為精字曰陰精先至似無不可然常見初笄女子有一合而即孕者彼於此時畏避無暇何雲精泄但其情動則氣至氣至則陰闢陰闢則吸受吸受則無不成孕此自然之正理也若褚氏之說似穿鑿矣一東垣曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女按此說亦非確論今見多生女者每加功於月經初淨而必不免於女者豈亦其血勝而然乎一丹溪曰陰陽交構胎孕乃凝所藏之處名曰子宮一系在下上有兩歧中分為二形如合缽一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成按此乃與聖濟經左動成男右動成女之說同第以子粒驗之無不皆有兩瓣故在男子亦有二丸而子宮之義諒亦如此惟左受成男右受成女之說則成非事後莫測其然即復有左射右射之法第恐陰中闔闢自有其機即欲左未必左欲右未必右而陰陽相勝之理則在天時人事之間似仍別有一道耳續篇大意張景岳先生宜麟策為求嗣者必讀之書今採諸書名論編為四類以續之曰蓄德曰培元曰布種曰胎教或補其未備之義或發其未暢之旨合而讀之遵而行之無弗子者矣乾道蓄德一孕元立本章云天地之大德曰生人者天地之心也具此生理生生無窮乃有無子者曷故觀夫層冰積雪天行肅殺之令地合閉蟄之德斯時生物亦鮮矣人之氣稟無偏而生機偶歇者非其心之所趨冬秋陰慘之氣深春夏陽和之氣少乎故不可錄曰殘惡之人多無子陰賊之人多無子好殺之人多無子淫亂之人多無子財緊之人多無子清刻之人多無子狷隘之人多無子好潔之人多無子是豈天定之哉由人心之自致耳然人心至靈如舟之有舵一捩便轉其捩轉之術如何曰存仁而已矣仁者生之德是以草木蔬谷百果之核名之曰仁植之無有不生者也人能在在存仁隨地隨時不放過去如有言責者用其言如林給事疏減賑米妻夢神責二子皆死門戶遂絕則奏疏活人者後嗣蕃昌必矣有官職者盡其職如虞允文禁民溺女本無子而有子之類將兵者不嗜殺如曹彬徐達子孫貴盛之類掌刑者不妄刑如馬默除島囚投海之例本無嗣而有子之類富者不私其富一切眾生以財為命凍者得之暖飢者得之飽離者得之合死者得之生財聚於我寬一分則人受一分之福其仁豈不薄哉多男之慶有必然者貧賤者能盡其誠如任奔走效口舌以解人之厄恤人之難隱人之過成人之善步步是仁所謂不費錢功德也非求嗣之捷徑乎凡此皆自盡其心而已然已默契夫天地生物之心種豆者其苗必豆種瓜者其苗必瓜斷斷然矣夫所謂捩轉云何即改過之謂也人非聖賢孰能無過過而能改即求仁得仁是故存仁之道以改過為先欲求有子而且賢者可不以此為首務哉坤道蓄德二又云夫子贊乾元資始曰大贊坤元資生曰至坤者順承乎天以成其生物之功故曰妻者齊也是以子嗣之有無重在男子尤重在婦人婦人雖不與戶外事倘其悖謬垂戾之性成而門內先受其禍既失其坤順之德豈能著生物之功或孕而不育育而不壽者多矣婦人之心求子最切禱祀求神神弗福也曷若近而求之門內耶公姑孝之夫主敬之妯娌和之奴婢恤之庶事寬之如是則戾氣消和氣溢作善降祥瓜瓞之慶神必福之矣又有婦人焉性非凶暴貌似柔和亦艱於子嗣者蓋婦人秉質於陰易流為毒其家庭日用之常處心積慮之地煞有關係常見有能幹之婦其營家也勤而儉其持己也謹而嚴錙銖之數無差恩怨之分至晰揆其大較不過自私自利之心多恕人寬人之地少似乎無大失德然而家業暗替子息杳然何哉蓋婦人之德不期於寬厚即流於刻薄剝削元氣於冥冥之中是為隱慝故不特悖謬乖肩為無嗣之顯端即事事義勝於恩已非坤厚生物之體矣婦人無子即干七出之條可不痛自修省贊夫為善以期螽斯麟趾之慶哉精血盛衰之驗培原一褚尚書曰飲食五味養髓骨肉血肌膚毛髮男子為陽陽中必有陰陰中之數八故一八而陽精升二八而陽精溢女子為陰陰中必有陽陽中之數七故一七而陰血升二七而陰血溢陽精陰血皆飲食五味之秀實也方其升也智慮開明齒牙更始發黃者黑筋弱者強暨其溢也凡充身肢體手足耳目之餘雖針芥之瀝無有不下凡子形肖父母者以其精血嘗於父母之身無所不歷也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出內敗小便道澀而為淋精已耗而復竭之則大小便道牽疼愈疼則愈欲大小便愈便則愈疼女人天癸既至逾十年無男子合則不調未逾十年思男女合亦不調不調則舊血不出新血誤行或漬而入骨或變而之腫或雖合而難子合男子多則瀝枯虛人產乳眾則血枯殺人觀其精血思過半矣聚精之道有五培原二袁了凡先生云聚精之道一曰寡欲二曰節勞三曰息怒四曰戒酒五曰慎味今之談養生者多言採陰補陽久戰不泄此為大謬腎為精之府凡男女交接必擾其腎腎動則精血隨之而流外雖不泄精已離宮未能堅忍者亦必有真精數點隨陽之痿而溢出此其驗也如火之有煙焰豈有復反於薪者哉是故貴寡欲精成於血不獨房勞之交損吾之精凡日用損血之事皆當深戒如目勞於視則血於視耗耳勞於聽則血以聽耗心勞于思則血于思耗吾隨事而節之則血得其養而與日俱積矣是故貴節勞主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也怒則傷肝而相火動動則疏泄者用事而閉藏不得其職雖不交合亦暗流而潛耗矣是故當息怒人身之血各歸其舍則常凝酒能動血人飲酒則面赤手足俱紅是擾其血而奔馳之也血氣既衰之人數月無房事精始厚而可用然使一夜大醉精隨薄矣是故宜戒酒內經云精不足者補之以味然釀郁之味不能生精惟恬淡之味乃能補精耳蓋萬物皆有真味調和勝而真味衰矣不論腥素淡煮之得法自有一段沖和恬淡之氣益人腸胃洪範論味而曰稼穡作甘世間之物惟五穀得味之正但能澹食穀味最能養精又凡煮粥飯中有厚汁滾作一團者此米之精液所聚也食之驟能生精試之有效葆真為種子首務培原三大生要旨云大寒之後必有陽春天地之道不蟄封則不發育也今人之無子者往往勤於色欲豈知施泄無度陽精必薄縱欲適情真氣乃傷妄欲得子其能孕乎夫男象天主施女象地主受一施一受其妊始成今其所施全非先天濃郁之氣不過後天澆漓渣滓之物縱使陰受可化而實無陽施之用矣故有心種子者毋傷于思慮毋耗其心神毋意馳於外而內虛毋志傷於內而外駁毋以酒為色媒毋以藥而助火葆精匯神靜養日久及至陰陽交媾兩神相搏其一點先天元真之氣勃勃生育之機即寓於情欲大動之時萬舉而萬當矣內經云陰平陽秘精神乃治陰陽離決精氣乃絕老子曰必清必靜毋搖爾精人鏡經曰精氣盛則生二男諺云寡欲多男子歷歷名言不特老而無子者當奉為龜鑑即壯年難子者亦須尊為節符寡欲廣嗣篇云世人無不急於生子亦知生子之道精氣交媾熔液成胎故少欲之人恆多子且易育氣固而精凝也多欲之人恆艱子且易天氣泄而精薄也譬之釀酒然鬥米下鬥水則酒濃且耐久其質全也鬥米倍下水則淡三倍四倍則酒非酒水非水矣其真元少也今人夜夜淫縱遍御妾婢精氣妄泄邪火上升邪火愈熾真陽愈枯安能成胎即僥倖生子亦不能育或殤於痘或殤於驚痘者熱毒驚者熱風毒者父母之真精不足風者父母之真氣不固也昔有人艱於子息醫者教以節欲靜攝勿勞心神心靜則精不搖神完則氣不走每妻經淨乃一交媾否則各榻如是半年妻果有娠娠後即異榻足月之後果生男子後來天花只三五粒彼求子而廣蓄婢妾不知節欲豈有當哉藥忌燥熱培原四大生要旨云天地之道只貴和平太熱則陽亢太寒則陰凝陰凝肅殺人果知之陽亢消爍人都不察常見世之艱於子嗣者構覓傳方希圖種子其方大抵興陽壯熱之品居多甚至鍛鍊金石及製取毒穢悍劣諸物劫盡其陰以為培陽益以房幃重耗漸至髓消肉減神昏氣奪毛瘁色枯尚不知為藥所誤可勝道哉色戒男淫培原五陳成卿曰養生家言男淫損人尤倍於女蓋男為陽兩陽相亢必竭其精精竭則寒寒則不能生育故求嗣者當首戒男淫且穀道為幽冷穢濁之地屢屢犯之氣偏為戾縱陽未衰而有子非生而不育即長亦為敗家之子知以後嗣為重者可不畏乎況溺於此者或痿廢或失明未老先衰不一而足是以有子者亦當深戒也人能痛自改悔誓不再蹈前非外資藥力內養生機久久堅持陽和漸復不特寧馨有慶且康壽可期矣合男女必當其年布種一褚尚書求男論云建平孝王妃姬皆麗無子擇民家未笄女子入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所產皆女者有所產皆男者大王誠能訪求多男婦人至宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也百脈齊到則孕成布種二程鳴謙云褚澄氏言男女交合陰血先至陽精後沖而男形成陽精先入陰血後參而女形成信斯言也人有精先泄而生男精後泄而生女者獨何歟東垣曰經水才斷一二日血海始淨感者成男四五日血脈已旺感者成女至於六七日後則雖交感亦不成胎信斯言也人有經始斷交合生女經久斷交合生男者亦有四五日以前交合無孕八九日以後交合有孕者獨何歟俞子本撰廣嗣要略著方立圖謂實陽能入虛陰實陰不能受陽即東垣之故見也又謂微陽不能射陰弱陰不能攝陽信斯言也世有尪羸之夫怯弱之婦屢屢受胎雖欲止之而不能止者亦有血氣方剛精力過人顧乃艱於育嗣而莫之救者獨何歟朱丹溪論治專以婦人經水為主然富貴之家侍妾已多其中寧無月水當期者乎有已經前夫頻頻生育而娶此以圖其易者顧亦不能得胎更遣與他人轉盼生男矣豈不能受孕於此而能受孕於彼乎愚以為父母之生子如天地之生物易曰坤道其順乎承天而時行夫知地之生物不過順承乎天則知母之生子亦不過順承乎父而已知母之順承乎父則種子者果以婦人為主乎以男子為主乎然所謂主於男子者不拘老少強弱康寧病患精易泄難泄只以交感之時百脈齊到為善耳交感而百脈齊到雖老弱病患易泄亦可以成胎交感而百脈參差雖少強雖康寧雖難泄亦難以成胎矣婦人所構之血固由於百脈合聚較之男子之精不能無輕重之分也孔子贊乾元資始曰大贊坤元資生曰至得無意乎若男婦之辨又不以精血先後為拘不以經盡幾日為拘不以夜半前後交感為拘不以父強母弱母強父弱為拘只以精血各由百脈齊到者別勝負耳是故精之百脈齊到有以勝乎血則成男矣血之百脈齊到有以勝乎精則成女矣至有既孕而小產者有產而不育有育而不壽者有壽而黃耈無疆者則亦精血之堅脆分為修短耳世人不察其精血之堅脆已定於稟受之初乃以小產專責之母以不育專付之兒以壽天專諉之數不亦謬乎種子須知絪縕之時布種三袁了凡云天地生物必有絪縕之時萬物化生必有樂育之時貓犬至微將受娠也其雌必狂呼而奔跳以絪縕樂育之氣觸之而不能自止耳此天然之節候生化之真機也世人種子有云三十時辰兩日半二十八九君須算此特言其大概耳非的論也丹經云一月止有一日一日止有一時凡婦人一月經行一度必有一日絪縕之候於一時辰間氣蒸而熱昏而悶有欲交接不可忍之狀此的候也於此時逆而取之則成丹順而施之則成胎矣其曰三日月出庚又曰溫溫鉛鼎光透簾幃皆言其景象也當其欲情濃動之時子宮內有如蓮花蕊者不拘經淨幾日自然挺出陰中如蓮蕊初開婦人洗下體以手探之自知也但含羞不肯言耳男子預密告之令其自言一舉即中矣娠子論胎教一娠子論云至精才化一氣方凝始受胞胎漸成形質子在腹中隨母聽聞自妊娠之後則須行坐端嚴性情和悅常處靜室多聽美言令人講讀詩書陳說禮樂耳不聞非言目不觀惡事如此則生男女福壽敦厚忠孝賢明不然則生男女多鄙賤不壽而愚頑此所謂外象而內感也昔太妊懷文王耳不聽惡聲目不視惡色口不出惡言世傳胎教之道此之謂也逐月養胎胎教二徐之才曰妊娠一月名胎胚飲食精熟酸羹受御宜食大麥毋食腥辛是謂才正是月足厥陰脈養胎不可針灸其經足厥陰屬肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠二月名始膏毋食辛臊居必靜處男子勿勞百節皆痛是為胎始是月足少陽脈養胎不可針灸其經少陽屬膽主精二月之時兒精成於胞里當慎護之勿驚動也妊娠三月名始胎此時未有定象見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是謂外象而內感者也是月手心主脈養胎不可針灸其經屬心毋悲哀思慮驚動妊娠四月始受水精以成血脈食宜稻宜魚是謂盛血氣以通耳目而行經絡是月手少陽脈養胎不可針灸其經內輸三焦此時兒六腑順成當靜形體和心志節飲食妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣服食稻粱羹牛羊和以茱萸調以五味是謂養氣以定五臟是月足太陰脈養胎不可針灸其經屬脾此時兒四肢皆成毋太飢飽毋食乾燥毋自炙熱毋太勞倦妊娠六月始受金精以成其筋身欲小勞毋逸出遊於野食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂是月足陽明脈養胎不可針灸其經屬胃主口目此時兒口目皆成調五味食甘美毋太飽妊娠七月始受水精以成其骨勞身搖肢毋使定止動作屈伸以運血氣居處必燥飲食避寒食稻粱以密腠理是謂養骨而堅齒是月手太陰脈養胎不可針灸其經屬肺主皮毛此時兒皮毛已成毋多言哭毋洗浴毋薄衣毋飲冷妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理而光澤顏色是月手陽明脈養胎不可針灸其經屬大腸主九竅此時兒九竅皆成毋食燥物毋輒失食毋忍大便妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力是月足少陰脈養胎不可針灸其經屬腎主續縷此時兒脈絡續縷皆成毋處濕冷無著炙衣妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備只俟時而生是月足太陽脈養胎不可針灸其經屬膀胱宜服滑胎藥胎教邇言胎教三張石頑曰胎教之說世都未諳妊娠能遵而行之不特無產難之虞且生子鮮胎毒殤夭之患誠為廣嗣要旨姑以大概陳之婦人經後四十餘日不轉即謹房室慎起居薄滋味養性情刻刻存心與執持寶玉無異舉趾必徐行立勿仰坐不實其前陰臥勿久偏一側弗舉手攀高取物勿擎手沐浴篦頭不可看異形不可獨處暗室毋登高毋臨深毋移重毋磋跌忌耽坐嗜臥使氣血凝滯雖不可負重作勞然須時時小役四體則經絡流動胎息易於運動腰腹漸粗飲食不宜過飽茶湯更須節省大熱大涼總非所宜犬羊蟹鱉等一切有毒之物固宜切禁即椒姜常用之品亦須少嘗其豕肉醇酒濕面之類縱不能摒絕不食亦不可恣啖歸精於胎過於蕃長致母臨蓐難產而子在胞中稟質肥脆襁褓必多羸困即如沃壤之草木移植塉土枝葉得不凋委乎甫交三月即當滿裹其腹胎氣漸長僅可微松其束切勿因其氣急滿悶而頓放之在夏洗澡須避熱湯冬時寤寐勿迫爐炭其最甚者尤在不節交合淫火盡歸其子以釀痘疹疥癩之毒然須妊娠稟性安靜不假強為方遵實濟若強制以違其性則鬱火彌熾此與恣情無禁者雖截然兩途而熱歸胎息則一嘗見有切於求嗣者得孕即分處房帷而子仍歿於痘豈非強制其火彌熾之明驗乎蓋人之志欲匪一苟未能超出尋常又須曲體母情適其自然之性使子氣安和是即所謂胎教也當知胎教原非一端若懷子受驚則子多胎驚懷子抱郁則子多結核流注懷子恐懼則子多癲癇懷子常起貪妄之念則子多貪吝懷子常挾憤之心則子多暴狠懷子常造綺語詭行則子多詐偽非但懷子之後當檢束身心而經淨交感慎毋恣肆以遺胎息之患若大醉後媾精精中多著酒濕則子多不育大怒後媾精精中多挾怒火即子多乖戾大勞後媾精精中不滿真氣則子多孱弱若夫熱藥助戰作意秘精精中流行毒悍則子多異疾至於風雨雷電媾精感觸震氣則子多怪類以此言之則三元五臘宜確遵禁戒誕育自是不凡宗祧重務安得視為嬉戲哉保孕六說胎教四胎前節養篇云一除惱怒凡受胎後切不可打罵人蓋氣調則胎安氣逆則胎病惱怒則痞塞不順肝氣上衝則嘔吐衄血脾肺受傷肝氣下注則血崩帶下滑胎小產欲生好子者必須先養其氣氣得其養則生子性情和順有孝友之心無乖戾之習所謂和氣致祥一門有慶無不由胎教得之二禁房勞保胎以絕欲為第一要事試觀貓犬至微尚知有孕不復交合何況人為萬物之靈豈反不如之耶所以婦人於經過一二日交感之後只宜分床獨宿清心靜養則臨盆易生易育得子少病多壽倘或房勞不慎必致陰虛火旺半產滑胎可不謹歟三戒生冷胎前喜食生冷只因懷孕以後多惱多氣不慎房勞以致火旺口渴殊不知生冷等物豈能退血分之熱徒使脾胃受傷瘧疾痢疾嘔吐泄瀉諸病皆由此起病則消耗精液口渴愈甚惟戒惱怒慎房勞服健脾補血之藥調理本原可保平復否則臨產之虛脫產後之絕證斷不免也四慎寒溫胎前感冒外邪或染傷寒時證鬱熱不解往往小產墮胎攸關性命要知起居飲食最宜調和夏不登樓宜著地氣夜不露坐宜暖背腹古人有言不受寒自不發熱不傷風自不咳嗽此為胎前緊要關頭五服藥餌胎前產後藥能起死回生世人鑑誤治之害遂言胎產不必服藥迷亂人意以致關於調補株守含忍勉強臨盆諸證蜂起若知接養有方隨時調治其所安全母子者藥餌之功正復不淺也六宜靜養胎前靜養乃第一妙法不校是非則氣不傷矣不爭得失則神不勞矣心無嫉妒則血自充矣情無淫蕩則精自足矣安間寧靜即是胎教紹宗祧之重承舅姑之歡葉琴瑟之和衍螽斯之慶所以古人必先靜養無子者遵之即能懷孕懷孕者遵之即為易育靜養所關豈不大哉防磋跌胎教五保生輯要云孕婦切忌傾跦懷子之初胎元未固一遭磋跌多致損墮至月分已多兒神識初生魄魂怯弱母身傾跌兒在母腹如山崩地陷神驚氣亂無論胎墮子母不保即幸而生育其子必有胎驚夭折之虞可不慎哉忌多浴胎教六護生編云凡覺受妊不可抬手洗頭不可曲身洗足不可熱湯多洗下體易致竅開胎墮初受胎及臨月尤宜禁戒關係不小也論胎肖胎教七月令先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災是可知民生垂疣枝指朦聾喑啞侏儒跛躄形體不備者其來有故矣聖人早戒於生身受氣之初後人徵驗於凝質象形之際所謂胎肖之說其言豈不可信哉霏雪錄云礬昌高八舍家軒墀間畜龜數年生育至百餘其家產子四五人皆龜胸傴僂至正末越有夫婦二人於大善寺金剛神側縛葦而居其婦產一子首兩肉角鼻孔昂縮類所謂夜叉形陳白雲家籬落間植決明家人摘以下茶生三子皆短而跛而王氏女甥亦跛予皆識之會稽民朱氏一子亦然其家亦多種之悉拔去胎養保真論云吾見鄙俗婦人懷胎時看搬傀儡裝神像舞猴戲者後生子貌多肖之便產須知云孕婦應避宰殺凶殘之事不見殘廢穢毒之人種種瑣言其旨衷於聖訓可忽乎哉蓋胎元化始未有定儀如鑑納形有感隨象自然之理也修造犯胎不足信胎教八便產須知云不利嗣息動必成災雖鄰家自家修造動土犯其胎氣令子破形損命刀犯者形必傷泥犯者竅必壅打擊者色青黯繫縛者相拘攣等說此為術者妄言百無一驗必不可信惟修造興工下椿動土皆非娠婦所宜見謹避之可也轉女為男之理胎教九乾坤秘竅云古人有轉女為男之法夫男女媾精陽勝成男陰勝成女氣以成形豈有法焉可以人力轉變之哉其法於始覺有娠之時以斧仰置孕婦床下弗令知之則生男又為之說曰如不信待雞抱卵時置斧窠中則一窠盡雄又法取弓弩弦縛孕婦腰下滿百日去之又法三月以前或取雄雞尾尖上長毛三莖或取夫發及手足甲潛安婦人臥席下弗令知之又法帶雄黃袋或佩宜男草是瑣瑣者豈竟能奪造化之功哉此難憑信者也然而術不足信理有可憑轉女為男實有良法人能方寸之地刻刻栽培積功累行則陽長陰消陰從陽化不弄瓦而弄璋有斷斷然者則人定可勝天特恐人之不能自蓄其德耳孕婦飲食忌胎教十雞肉合糯米食令子生寸白蟲食犬肉令子無聲鱠鯉同雞子食令子生疳多瘡兔肉食之令子缺唇羊肝令子多厄難鱉肉令子短頸鴨子與桑堪同食令子倒生心寒鱔魚同田雞食令子喑啞雀肉合豆醬同食令子面生雀斑黑子食螃蟹橫生食子姜令子多指生瘡食水漿冷絕產食雀肉飲酒令子多淫無恥食茨菰消胎氣乾薑蒜雞毒胎無益黏膩難化傷胎食山羊肉子多病無鱗魚勿食菌有大毒食之令子風而夭食雀腦令子雀目孕婦藥物忌胎教十一蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜代赭莞花麝大戟蛇蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑蟹甲爪硼砂乾漆兼桃仁地膽茅根莫用好附保命延生戒期從來娶婦必期偕老生子必望長成乃人有伉儷極篤而中道死亡產育艱難而半途夭折者只因肆情縱欲暗犯禁忌而不自知也道經云男女交媾最有避忌若犯所忌天奪其算神降之殃生子醜貌怪相性行不良殘疾夭札實有明驗故君子不獨外色鋤之務盡即房幃之內琴瑟之歡俱有克治之道焉正月初一名天臘玉帝下界校世人祿命犯者削祿奪紀初三萬神都會犯者奪紀初五五虛初六六耗初七上會初九玉皇上帝誕犯者絕嗣十四三元下降犯者減壽十五天官誕十六三元下降二十五每月二十五為月晦日犯者減壽二十七北斗下降犯者奪紀每月如此二十八每月二十八神人在陰犯者惡疾三十每月三十灶君奏事犯者減壽如逢月小即戒二十九嗣後每月初三皆宜避忌二月初一犯者奪紀每月如此初三文昌帝君誕又萬神教會犯者削祿奪紀十五犯者奪紀每月如此十八至聖先師孔子諱辰犯者削祿奪紀十九觀音大士誕犯者奪紀二十五二十七二十八三十俱同前三月初一同前初三玄天上帝誕犯者奪紀初九牛鬼神出犯者產惡胎十五同前十六准提菩薩誕犯者奪紀十八中嶽帝誕二十五二十七俱同前二十八東嶽帝誕犯者削祿奪紀三十同前四月初一同前初四萬神善化犯者失喑初八佛誕又善惡童子降犯者血死十四呂祖誕十五同前二十五二十七二十八三十俱同前五月初一同前初五名地臘五帝考校生人官爵犯者削祿奪紀自初五初六初七十五十六十六二十五二十六二十七此九日名九毒日犯者天亡十五子時犯者男女三年內雙亡十六為天地萬物造化之辰最忌十三關聖帝君成神日二十八三十俱同前六月初一同前十五同前十九觀音得道二十三火神誕二十四關帝聖誕又雷祖誕二十五二十七二十八三十俱同前七月初一同前初七名道德臘五帝校生人善惡初十陰毒日十五地官校籍犯者奪紀十九太歲誕二十五二十七二十八同前三十地藏菩薩誕犯者奪紀八月初一同前初三灶君誕又北斗誕犯者奪紀初十北嶽帝誕十五太陰朝元焚香守夜二十五同前二十七至聖先師孔子誕犯者削祿奪紀二十八三十俱同前九月初一同前初九鬥母誕犯者奪紀十五同前十七金龍四大王誕十九觀音出家犯者困苦二十五二十七二十八三十俱同前十月初一歲臘初五下會初六天曹考察初十西天王降犯者暴亡十五水官校籍犯者奪紀二十五同前二十七北極紫微大帝誕二十八三十俱同前十一月初一同前十一太乙救苦天尊誕十五同前十七阿彌陀佛誕犯者奪紀二十五二十七二十八三十俱同前十二月初一同前初七犯者惡疾初八初旬戊日名王侯臘十五同前十六南嶽帝誕二十天地交道犯者奪紀二十四司命上奏善惡二十五上帝下界考察二十七二十八同前除夕諸神考察犯者奪紀每歲二至之日夏至冬至乃陰陽相爭死生分判之時宜禁欲事二分春分雷將發聲犯者生子五官四肢不全父母有災秋分殺氣浸盛陽氣日衰前後數日俱宜戒三元日犯之減壽五年四始二分二至社日犯之減壽四年三伏日弦日晦日犯之減壽一年庚申甲子日祭祀前齋戒日父母誕日諱日夫婦誕日本命日犯之減壽一年丙丁日犯之得病白晝星月下燈光下犯之損壽烈風雷雨日月薄蝕高山大川之上犯之損壽產惡胎酷暑嚴寒犯之得重疾寺廟之中井灶坑廁塚墓屍柩之傍犯之惡人降胎鬱怒大怒傷肝犯之必病遠行行房百里者病百里行房者死醉飽醉後入房五臟反覆空腹犯之傷元神胎前犯之傷胎產後百日內犯之婦病天癸來時犯之男女俱損病後犯之變症一夕勿兩度勿忍蓄不泄竹蓆竹性寒涼犯之恐感寒氣薄衾犯之寒氣入骨牖罅有風宜避夜深就枕宜戒陳摶曰上士異室中士異床下士異被守此戒期者非異室異床不可謹按禮記月令日夜分雷乃發聲先雷三日奪木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災可知禁忌自古有之日長至則曰止聲色毋或進日短至則曰去聲色禁嗜欲蓋冬夏二至陰陽相爭之時最難保護前後數日皆宜絕欲語云樂極生悲縱欲成患謹勸世人須為長久之歡弗逞暫時之樂夫欲濃則暫欲淡則長其理不爽其事不誣也凡一切非地非時者能不嚴戒乎篤信之士賢德之婦每逢禁忌必謹遵之不特身其康強自能多生好子矣
